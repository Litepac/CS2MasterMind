<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mastermind Replay Viewer</title>
<style>
:root{--bg:#071019;--panel:#0d1824;--panel-2:#101e2d;--line:#1d3042;--text:#eef5fb;--muted:#89a2b8;--accent:#20e1bb;--ct:#63cfff;--t:#f1a55f;--kill:#ff6a5b;--dead:rgba(124,140,154,.42);--shadow:0 18px 40px rgba(0,0,0,.28)}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:linear-gradient(180deg,#08121b 0%,#071019 100%);color:var(--text);font:14px/1.45 system-ui,Segoe UI,Arial,sans-serif}button,input{font:inherit}.app{display:grid;grid-template-rows:auto 1fr;height:100vh}.top{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(7,16,25,.95)}.title{font-size:22px;font-weight:800;letter-spacing:.02em}.meta{display:flex;gap:14px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.meta strong{color:var(--text)}.grow{flex:1}.btn{border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg,#152636,#0b141e);color:var(--text);padding:8px 12px;cursor:pointer}.btn:hover{border-color:var(--accent);color:var(--accent)}.layout{display:grid;grid-template-columns:260px minmax(0,1fr) 340px;gap:16px;padding:16px;min-height:0}.panel{display:grid;min-height:0;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,var(--panel),var(--panel-2));box-shadow:var(--shadow)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}.panel-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em}.panel-sub{font-size:12px;color:var(--muted)}.rounds-panel,.feed-panel{grid-template-rows:auto minmax(0,1fr)}.round-list,.kill-feed{overflow:auto;padding:12px;display:grid;gap:10px}.round-btn,.kill-row{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.02)}.round-btn{padding:12px;display:grid;gap:8px;text-align:left;cursor:pointer}.round-btn:hover,.round-btn.active{border-color:var(--accent);background:#112030}.round-top,.round-bottom,.kill-meta,.kill-main{display:flex;justify-content:space-between;gap:10px;align-items:center}.round-top{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.round-main{font-size:18px;font-weight:800}.round-bottom{font-size:12px;color:var(--muted)}.stage-panel{grid-template-rows:auto auto minmax(0,1fr) auto}.scorebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}.team-score{display:grid;gap:2px}.team-score:last-child{text-align:right}.team-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em}.team-label.ct{color:var(--ct)}.team-label.t{color:var(--t)}.score-value{font-size:48px;line-height:1;font-weight:800}.divider{width:1px;height:56px;background:var(--line)}.stage-meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}.metric{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02)}.metric-k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.16em}.metric-v{margin-top:6px;font-size:16px;font-weight:700}.canvas-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:16px;min-height:0}.canvas-shell{position:relative;width:min(100%,calc(100vh - 290px));max-width:100%;aspect-ratio:1;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#050c13}.stage-badge{position:absolute;top:12px;left:12px;padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(7,16,25,.84);font-size:11px;text-transform:uppercase;letter-spacing:.12em}.canvas-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center;color:var(--muted)}canvas{display:block;width:100%;height:100%}.controls{display:grid;gap:10px;padding:14px 16px;border-top:1px solid var(--line)}.btn-row,.scrub-row{display:flex;align-items:center;gap:10px}.timecode{width:58px;text-align:center;color:var(--accent);font-size:12px}#scrub{flex:1;accent-color:var(--accent)}.kill-row{padding:12px;cursor:pointer;display:grid;gap:8px}.kill-row:hover,.kill-row.active{border-color:var(--kill);background:rgba(255,106,91,.08)}.kill-row.upcoming{opacity:.58}.kill-main{font-weight:700}.kill-weapon{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.1em}.kill-meta{font-size:12px;color:var(--muted)}.kill-empty,.round-empty{padding:18px;color:var(--muted)}@media (max-width:1200px){.layout{grid-template-columns:220px minmax(0,1fr) 300px}}@media (max-width:980px){.layout{grid-template-columns:1fr;grid-template-rows:auto auto auto}.canvas-shell{width:min(100%,70vh)}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <div class="title">Mastermind Replay</div>
      <div class="meta">
        <span><strong id="metaDemo">No demo</strong></span>
        <span><strong id="metaMap">No map</strong></span>
        <span><strong id="metaStage">Grid stage</strong></span>
      </div>
    </div>
    <div class="grow"></div>
    <button class="btn" id="loadBtn">Load replay JSON</button>
    <input id="fileInput" type="file" accept=".json,application/json" hidden>
  </div>

  <div class="layout">
    <section class="panel rounds-panel">
      <div class="panel-head">
        <div class="panel-title">Rounds</div>
        <div class="panel-sub" id="roundCount">0 rounds</div>
      </div>
      <div class="round-list" id="roundList">
        <div class="round-empty">Load a replay to browse rounds.</div>
      </div>
    </section>

    <section class="panel stage-panel">
      <div class="scorebar">
        <div class="team-score">
          <div class="team-label ct">CT</div>
          <div class="score-value" id="ctScore">0</div>
        </div>
        <div class="divider"></div>
        <div class="team-score">
          <div class="team-label t">T</div>
          <div class="score-value" id="tScore">0</div>
        </div>
      </div>

      <div class="stage-meta">
        <div class="metric"><div class="metric-k">Round</div><div class="metric-v" id="roundValue">-</div></div>
        <div class="metric"><div class="metric-k">Phase</div><div class="metric-v" id="phaseValue">Idle</div></div>
        <div class="metric"><div class="metric-k">Tick</div><div class="metric-v" id="tickValue">0</div></div>
        <div class="metric"><div class="metric-k">Round Kills</div><div class="metric-v" id="killCount">0</div></div>
      </div>

      <div class="canvas-wrap">
        <div class="canvas-shell">
          <div class="stage-badge" id="stageBadge">No replay loaded</div>
          <div class="canvas-empty" id="emptyState">Load a replay JSON to verify the 2D stage, rounds, and kill feed.</div>
          <canvas id="stageCanvas" width="1024" height="1024"></canvas>
        </div>
      </div>

      <div class="controls">
        <div class="btn-row">
          <button class="btn" id="backRound">Prev round</button>
          <button class="btn" id="playBtn">Play</button>
          <button class="btn" id="nextRound">Next round</button>
          <button class="btn" id="backFrame">-1 frame</button>
          <button class="btn" id="forwardFrame">+1 frame</button>
        </div>
        <div class="scrub-row">
          <div class="timecode" id="timeNow">00:00</div>
          <input id="scrub" type="range" min="0" max="0" value="0">
          <div class="timecode" id="timeEnd">00:00</div>
        </div>
      </div>
    </section>

    <section class="panel feed-panel">
      <div class="panel-head">
        <div class="panel-title">Kill feed</div>
        <div class="panel-sub" id="feedMeta">0 kills</div>
      </div>
      <div class="kill-feed" id="killFeed">
        <div class="kill-empty">Kill feed appears here for the active round.</div>
      </div>
    </section>
  </div>
</div>

<script>
const FULL_BOUNDS={left:0,top:0,width:1,height:1};
const UI={
  loadBtn:document.getElementById("loadBtn"),
  fileInput:document.getElementById("fileInput"),
  metaDemo:document.getElementById("metaDemo"),
  metaMap:document.getElementById("metaMap"),
  metaStage:document.getElementById("metaStage"),
  roundCount:document.getElementById("roundCount"),
  roundList:document.getElementById("roundList"),
  ctScore:document.getElementById("ctScore"),
  tScore:document.getElementById("tScore"),
  roundValue:document.getElementById("roundValue"),
  phaseValue:document.getElementById("phaseValue"),
  tickValue:document.getElementById("tickValue"),
  killCount:document.getElementById("killCount"),
  stageBadge:document.getElementById("stageBadge"),
  emptyState:document.getElementById("emptyState"),
  stageCanvas:document.getElementById("stageCanvas"),
  backRound:document.getElementById("backRound"),
  playBtn:document.getElementById("playBtn"),
  nextRound:document.getElementById("nextRound"),
  backFrame:document.getElementById("backFrame"),
  forwardFrame:document.getElementById("forwardFrame"),
  scrub:document.getElementById("scrub"),
  timeNow:document.getElementById("timeNow"),
  timeEnd:document.getElementById("timeEnd"),
  feedMeta:document.getElementById("feedMeta"),
  killFeed:document.getElementById("killFeed")
};
const state={
  data:null,
  rounds:[],
  frames:[],
  kills:[],
  frameIndex:0,
  playing:false,
  playTimer:null,
  radarImage:null,
  radarStatus:"grid",
  stageBounds:FULL_BOUNDS,
  selectedKill:null,
  speed:1
};

const fmtTime=seconds=>{
  const whole=Math.max(0,Math.floor(seconds));
  return `${String(Math.floor(whole/60)).padStart(2,"0")}:${String(whole%60).padStart(2,"0")}`;
};

function normalizeData(raw){
  return {
    ...raw,
    players:Array.isArray(raw.players)?raw.players.slice():[],
    rounds:Array.isArray(raw.rounds)?raw.rounds.slice().sort((a,b)=>a.number-b.number):[],
    frames:Array.isArray(raw.frames)?raw.frames.slice().sort((a,b)=>a.tick-b.tick):[],
    kills:Array.isArray(raw.kills)?raw.kills.slice().sort((a,b)=>a.tick-b.tick):[]
  };
}

function currentFrame(){
  return state.frames[state.frameIndex]||null;
}

function currentTick(){
  return currentFrame()?.tick||0;
}

function roundAtTick(tick){
  for(const round of state.rounds){
    if(tick>=round.startTick&&tick<=round.endTick)return round;
  }
  let fallback=null;
  for(const round of state.rounds){
    if(round.startTick<=tick)fallback=round;
  }
  return fallback||state.rounds[0]||null;
}

function currentRound(){
  return roundAtTick(currentTick());
}

function currentPhase(){
  const round=currentRound();
  const tick=currentTick();
  if(!round)return "Idle";
  if(tick>=round.startTick&&tick<=round.endTick)return "Live";
  const next=state.rounds.find(item=>item.number===round.number+1);
  if(next&&tick>round.endTick&&tick<next.startTick)return "Break";
  if(tick<round.startTick)return "Pregame";
  return "End";
}

function frameIndexAtOrAfterTick(targetTick){
  const found=state.frames.findIndex(frame=>frame.tick>=targetTick);
  return found>=0?found:Math.max(0,state.frames.length-1);
}

function normalizePlaybackPosition(){
  if(!state.frames.length||!state.rounds.length)return;
  const tick=currentTick();
  const firstRound=state.rounds[0];
  if(tick<firstRound.startTick){
    state.frameIndex=frameIndexAtOrAfterTick(firstRound.startTick);
    return;
  }
  const round=currentRound();
  if(!round)return;
  const next=state.rounds.find(item=>item.number===round.number+1);
  if(next&&tick>round.endTick&&tick<next.startTick){
    state.frameIndex=frameIndexAtOrAfterTick(next.startTick);
  }
}

function hasExplicitStageBounds(map){
  if(!map)return false;
  const left=typeof map.stageLeft==="number"?map.stageLeft:0;
  const top=typeof map.stageTop==="number"?map.stageTop:0;
  const width=typeof map.stageWidth==="number"&&map.stageWidth>0?map.stageWidth:1;
  const height=typeof map.stageHeight==="number"&&map.stageHeight>0?map.stageHeight:1;
  return left!==0||top!==0||width!==1||height!==1;
}

function explicitStageBounds(){
  const map=state.data?.map;
  if(!map||!hasExplicitStageBounds(map))return null;
  return {
    left:typeof map.stageLeft==="number"?map.stageLeft:0,
    top:typeof map.stageTop==="number"?map.stageTop:0,
    width:typeof map.stageWidth==="number"&&map.stageWidth>0?map.stageWidth:1,
    height:typeof map.stageHeight==="number"&&map.stageHeight>0?map.stageHeight:1
  };
}

function resolveStageBounds(){
  return explicitStageBounds()||FULL_BOUNDS;
}

function loadRadarImage(mapName){
  state.radarImage=null;
  state.radarStatus="grid";
  if(!mapName||!hasExplicitStageBounds(state.data?.map)){
    draw();
    renderHeader();
    return;
  }
  const url=`https://raw.githubusercontent.com/2mlml/cs2-radar-images/master/${String(mapName).toLowerCase()}.png`;
  const img=new Image();
  img.crossOrigin="anonymous";
  img.onload=()=>{
    state.radarImage=img;
    state.radarStatus="radar";
    draw();
    renderHeader();
  };
  img.onerror=()=>{
    state.radarImage=null;
    state.radarStatus="grid";
    draw();
    renderHeader();
  };
  img.src=url;
}

function playerById(){
  return new Map((state.data?.players||[]).map(player=>[player.id,player]));
}

function playerName(id){
  return playerById().get(id)?.name||id||"Unknown";
}

function teamColor(side){
  if(side==="ct")return getComputedStyle(document.documentElement).getPropertyValue("--ct").trim();
  if(side==="t")return getComputedStyle(document.documentElement).getPropertyValue("--t").trim();
  return getComputedStyle(document.documentElement).getPropertyValue("--dead").trim();
}

function scoreAtTick(tick){
  let scoreCT=0;
  let scoreT=0;
  for(const round of state.rounds){
    if(round.endTick&&round.endTick<=tick){
      scoreCT=round.scoreCT||0;
      scoreT=round.scoreT||0;
    }
  }
  return {scoreCT,scoreT};
}

function killsForRound(round){
  if(!round)return [];
  return state.kills.filter(kill=>kill.round===round.number);
}

function activeKillForRound(round){
  const tick=currentTick();
  let active=null;
  for(const kill of killsForRound(round)){
    if(kill.tick<=tick)active=kill;
  }
  return active;
}

function frameDurationMs(index){
  if(index<0||index>=state.frames.length-1)return 1000/state.speed;
  const current=state.frames[index];
  const next=state.frames[index+1];
  const deltaTicks=Math.max(1,(next?.tick||current.tick)-current.tick);
  return Math.max(80,Math.min(1200,(deltaTicks/64)*1000/state.speed));
}

function jumpToTick(tick){
  state.frameIndex=frameIndexAtOrAfterTick(tick);
  normalizePlaybackPosition();
}

function jumpToRound(round){
  if(!round)return;
  stopPlayback();
  jumpToTick(round.startTick);
  state.selectedKill=null;
  renderAll();
}

function stopPlayback(){
  state.playing=false;
  UI.playBtn.textContent="Play";
  if(state.playTimer){
    clearTimeout(state.playTimer);
    state.playTimer=null;
  }
}

function schedulePlayback(){
  if(!state.playing)return;
  if(state.frameIndex>=state.frames.length-1){
    stopPlayback();
    return;
  }
  const delay=frameDurationMs(state.frameIndex);
  state.playTimer=setTimeout(()=>{
    if(!state.playing)return;
    state.frameIndex+=1;
    normalizePlaybackPosition();
    renderAll();
    schedulePlayback();
  },delay);
}

function togglePlayback(){
  if(!state.frames.length)return;
  state.playing=!state.playing;
  UI.playBtn.textContent=state.playing?"Pause":"Play";
  if(state.playing)schedulePlayback();
  else stopPlayback();
}

function stepFrame(delta){
  stopPlayback();
  state.frameIndex=Math.max(0,Math.min(state.frames.length-1,state.frameIndex+delta));
  normalizePlaybackPosition();
  renderAll();
}

function projectPoint(nx,ny,size){
  const bounds=state.stageBounds||FULL_BOUNDS;
  const safeWidth=bounds.width||1;
  const safeHeight=bounds.height||1;
  return {
    x:((nx-bounds.left)/safeWidth)*size,
    y:((ny-bounds.top)/safeHeight)*size
  };
}

function drawGrid(ctx,size){
  ctx.strokeStyle="rgba(255,255,255,.05)";
  ctx.lineWidth=1;
  for(let i=0;i<=8;i++){
    const pos=(size/8)*i;
    ctx.beginPath();
    ctx.moveTo(pos,0);
    ctx.lineTo(pos,size);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0,pos);
    ctx.lineTo(size,pos);
    ctx.stroke();
  }
}

function drawBackground(ctx,size){
  ctx.clearRect(0,0,size,size);
  ctx.fillStyle="#07111a";
  ctx.fillRect(0,0,size,size);
  if(state.radarImage&&hasExplicitStageBounds(state.data?.map)){
    const bounds=state.stageBounds||FULL_BOUNDS;
    const imgWidth=state.radarImage.naturalWidth||state.radarImage.width;
    const imgHeight=state.radarImage.naturalHeight||state.radarImage.height;
    ctx.drawImage(
      state.radarImage,
      bounds.left*imgWidth,
      bounds.top*imgHeight,
      bounds.width*imgWidth,
      bounds.height*imgHeight,
      0,
      0,
      size,
      size
    );
    ctx.fillStyle="rgba(4,9,14,.22)";
    ctx.fillRect(0,0,size,size);
  }
  drawGrid(ctx,size);
}

function drawPlayers(ctx,size){
  const frame=currentFrame();
  if(!frame||!state.data)return;
  const players=playerById();
  for(const fp of frame.players||[]){
    if(typeof fp.x!=="number"||typeof fp.y!=="number")continue;
    const point=projectPoint(fp.x,fp.y,size);
    const x=Math.max(10,Math.min(size-10,point.x));
    const y=Math.max(10,Math.min(size-10,point.y));
    const side=players.get(fp.playerId)?.side;
    const radius=fp.alive?8:5;
    ctx.globalAlpha=fp.alive?1:.38;
    ctx.beginPath();
    ctx.arc(x,y,radius+4,0,Math.PI*2);
    ctx.fillStyle="rgba(0,0,0,.5)";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x,y,radius,0,Math.PI*2);
    ctx.fillStyle=fp.alive?teamColor(side):getComputedStyle(document.documentElement).getPropertyValue("--dead").trim();
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function draw(){
  const canvas=UI.stageCanvas;
  const ctx=canvas.getContext("2d");
  const size=canvas.width;
  drawBackground(ctx,size);
  if(!state.data)return;
  drawPlayers(ctx,size);
}

function renderHeader(){
  const round=currentRound();
  const tick=currentTick();
  const score=scoreAtTick(tick);
  UI.metaDemo.textContent=state.data?.demoName||"No demo";
  UI.metaMap.textContent=state.data?.mapName||"No map";
  UI.metaStage.textContent=state.radarStatus==="radar"?"Radar stage":"Grid stage";
  UI.roundCount.textContent=`${state.rounds.length} rounds`;
  UI.ctScore.textContent=String(score.scoreCT);
  UI.tScore.textContent=String(score.scoreT);
  UI.roundValue.textContent=round?`R${round.number}`:"-";
  UI.phaseValue.textContent=currentPhase();
  UI.tickValue.textContent=String(tick);
  UI.killCount.textContent=String(killsForRound(round).length);
  UI.stageBadge.textContent=round?`Round ${round.number} • tick ${tick}`:"No replay loaded";
  UI.timeNow.textContent=fmtTime(tick/64);
  UI.timeEnd.textContent=fmtTime((state.frames[state.frames.length-1]?.tick||0)/64);
  UI.emptyState.style.display=state.data?"none":"flex";
}

function renderRounds(){
  UI.roundList.textContent="";
  if(!state.rounds.length){
    const empty=document.createElement("div");
    empty.className="round-empty";
    empty.textContent="Load a replay to browse rounds.";
    UI.roundList.appendChild(empty);
    return;
  }
  const activeRound=currentRound();
  const fragment=document.createDocumentFragment();
  for(const round of state.rounds){
    const button=document.createElement("button");
    button.className=`round-btn${activeRound?.number===round.number?" active":""}`;
    const top=document.createElement("div");
    top.className="round-top";
    const number=document.createElement("span");
    number.textContent=`Round ${round.number}`;
    const score=document.createElement("span");
    score.textContent=`${round.scoreCT}-${round.scoreT}`;
    top.append(number,score);
    const main=document.createElement("div");
    main.className="round-main";
    main.textContent=(round.winnerSide||"-").toUpperCase();
    const bottom=document.createElement("div");
    bottom.className="round-bottom";
    const reason=document.createElement("span");
    reason.textContent=round.winReason||"pending";
    const ticks=document.createElement("span");
    ticks.textContent=`${round.startTick}-${round.endTick}`;
    bottom.append(reason,ticks);
    button.append(top,main,bottom);
    button.addEventListener("click",()=>jumpToRound(round));
    fragment.appendChild(button);
  }
  UI.roundList.appendChild(fragment);
}

function renderKillFeed(){
  UI.killFeed.textContent="";
  const round=currentRound();
  const kills=killsForRound(round);
  UI.feedMeta.textContent=`${kills.length} kills`;
  if(!round||!kills.length){
    const empty=document.createElement("div");
    empty.className="kill-empty";
    empty.textContent="No kills for the active round yet.";
    UI.killFeed.appendChild(empty);
    return;
  }
  const activeKill=state.selectedKill&&state.selectedKill.round===round.number?state.selectedKill:activeKillForRound(round);
  const fragment=document.createDocumentFragment();
  for(const kill of kills){
    const row=document.createElement("button");
    const upcoming=kill.tick>currentTick();
    row.className=`kill-row${activeKill===kill?" active":""}${upcoming?" upcoming":""}`;
    const main=document.createElement("div");
    main.className="kill-main";
    const attacker=document.createElement("span");
    attacker.textContent=playerName(kill.attacker);
    const victim=document.createElement("span");
    victim.textContent=`→ ${playerName(kill.victim)}`;
    main.append(attacker,victim);
    const meta=document.createElement("div");
    meta.className="kill-meta";
    const weapon=document.createElement("span");
    weapon.className="kill-weapon";
    weapon.textContent=kill.weapon||"-";
    const tick=document.createElement("span");
    tick.textContent=`tick ${kill.tick}`;
    meta.append(weapon,tick);
    row.append(main,meta);
    row.addEventListener("click",()=>{
      stopPlayback();
      state.selectedKill=kill;
      jumpToTick(kill.tick);
      renderAll();
    });
    fragment.appendChild(row);
  }
  UI.killFeed.appendChild(fragment);
}

function renderAll(){
  normalizePlaybackPosition();
  state.stageBounds=resolveStageBounds();
  renderHeader();
  renderRounds();
  renderKillFeed();
  draw();
  UI.scrub.max=String(Math.max(0,state.frames.length-1));
  UI.scrub.value=String(state.frameIndex);
}

async function loadReplay(file){
  const raw=JSON.parse(await file.text());
  state.data=normalizeData(raw);
  state.rounds=state.data.rounds;
  state.frames=state.data.frames;
  state.kills=state.data.kills;
  state.selectedKill=null;
  stopPlayback();
  state.stageBounds=resolveStageBounds();
  state.frameIndex=state.rounds.length?frameIndexAtOrAfterTick(state.rounds[0].startTick):0;
  loadRadarImage(state.data.mapName);
  renderAll();
}

UI.loadBtn.addEventListener("click",()=>UI.fileInput.click());
UI.fileInput.addEventListener("change",async event=>{
  const file=event.target.files?.[0];
  if(!file)return;
  try{
    await loadReplay(file);
  }catch(err){
    alert(`Could not load replay JSON: ${err.message}`);
  }
});
UI.playBtn.addEventListener("click",togglePlayback);
UI.backFrame.addEventListener("click",()=>stepFrame(-1));
UI.forwardFrame.addEventListener("click",()=>stepFrame(1));
UI.scrub.addEventListener("input",()=>{
  stopPlayback();
  state.frameIndex=Number(UI.scrub.value||0);
  normalizePlaybackPosition();
  renderAll();
});
UI.backRound.addEventListener("click",()=>{
  const round=currentRound();
  if(!round)return;
  const previous=state.rounds.find(item=>item.number===round.number-1);
  if(previous)jumpToRound(previous);
});
UI.nextRound.addEventListener("click",()=>{
  const round=currentRound();
  if(!round)return;
  const next=state.rounds.find(item=>item.number===round.number+1);
  if(next)jumpToRound(next);
});

renderAll();
</script>
</body>
</html>
