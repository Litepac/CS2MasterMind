services:
  postgres:
    image: postgres:16
    container_name: skybox_light_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skybox_light
      POSTGRES_USER: skybox
      POSTGRES_PASSWORD: skybox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
